name: Sync to GitLab

on:
  schedule:
    # Runs daily at 09:17 UTC — moved out of 03:xx cluster.
    # Still after sync-forks (06:00) and sync-upstream-sources (01:30).
    - cron: '17 9 * * *'
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Push only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to GitLab"
        required: false
        default: false
        type: boolean
      force:
        description: "Force-push even if GitLab branch has diverged"
        required: false
        default: false
        type: boolean
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

concurrency:
  group: sync-to-gitlab
  cancel-in-progress: true

# ── Rate limits ──────────────────────────────────────────────────────────────
# No REST API calls — only git clone + git push operations.
# Rate limiting manifests as git push rejections from GitLab.
# git_push_retry() retries up to 3 times with linear backoff (15 s, 30 s,
#   45 s). GitLab enforces per-project push limits; the retry loop handles
#   transient rejections without failing the workflow.

jobs:
  sync:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7

      - name: Sync repos to GitLab
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          BUDGET_MINUTES: "55"
        run: bash scripts/sync-to-gitlab.sh