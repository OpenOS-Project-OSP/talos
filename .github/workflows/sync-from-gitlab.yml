name: Sync from GitLab

on:
  schedule:
    # Daily at 04:22 UTC — scheduled fallback; the primary trigger is
    # GitLab CI on push (sync-from-gitlab job in .gitlab-ci.yml)
    - cron: '22 4 * * *'
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Sync only this repo name (leave blank for all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing to GitHub"
        required: false
        default: false
        type: boolean
      subgroup_filter:
        description: "Only sync repos from this GitLab subgroup"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - penguins-eggs_deving
          - immutable-filesystem_deving
          - linux-kernel_filesystem_deving
          - incus_deving
          - ops
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

concurrency:
  group: sync-from-gitlab
  cancel-in-progress: true

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitLab REST API (GITLAB_SYNC_TOKEN): 2 000 req/min per token.
#   gl_api_get() retries HTTP 429/403 with RateLimit-Reset sleep (up to 3×).
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr — used for repo existence checks.
#   gh_api_check() retries HTTP 403/429 with X-RateLimit-Reset sleep.

jobs:
  sync:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Sync repos from GitLab openos-project
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          BUDGET_MINUTES: "55"
        run: bash scripts/sync-from-gitlab.sh