name: Sync to GitLab Variant

# Pushes shared config files from fork-sync-all (GitHub) to
# fork-sync-all-gitlab (GitLab), applying union merge for registries and
# GitHub-wins for prose files.
#
# Triggers:
#   - Push to main when shared files change (fast path)
#   - Hourly schedule (full reconciliation)
#   - Manual workflow_dispatch

on:
  push:
    branches: [main]
    paths:
      - 'config/ota-registry.yml'
      - 'config/ota-blocklist.yml'
      - '.ota/schema.yml'
      - 'AGENTS.md'
      - 'CHANGELOG.md'
      - 'config/template-manifest.yml'
  schedule:
    - cron: '50 */4 * * *'  # Every 4h at :50 — variant sync is low-urgency
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report changes without writing"
        required: false
        default: false
        type: boolean
      direction:
        description: "Sync direction"
        required: false
        default: "github-to-gitlab"
        type: choice
        options:
          - github-to-gitlab
          - both

concurrency:
  group: sync-to-gitlab-variant
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "1000"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping. quota-monitor will retry."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync shared config to GitLab variant
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          GITHUB_REPO: Interested-Deving-1896/fork-sync-all
          GITLAB_PROJECT: openos-project/fork-sync-all-gitlab
          GITLAB_URL: https://gitlab.com
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: |
          DIRECTION="${{ inputs.direction || 'github-to-gitlab' }}"
          python3 scripts/variant-merge.py \
            --github-token  "$GH_TOKEN" \
            --gitlab-token  "$GITLAB_TOKEN" \
            --github-repo   "$GITHUB_REPO" \
            --gitlab-project "$GITLAB_PROJECT" \
            --gitlab-url    "$GITLAB_URL" \
            --direction     "$DIRECTION" \
            $([[ "$DRY_RUN" == "true" ]] && echo "--dry-run" || true)
