name: Validate Config

on:
  push:
    branches: [main]
    paths:
      - config/gitlab-subgroups.yml
      - config/workflow-sync.yml
      - config/workflow-cost-profiles.yml
      - config/template-manifest.yml
      - config/template-consumers.yml
      - registered-imports.json
      - scripts/validate-gitlab-subgroups.py
      - scripts/validate-workflow-guards.py
      - scripts/validate-registered-imports.py
      - scripts/validate-cost-profiles.py
      - scripts/validate-template-config.py
      - scripts/generate-gitlab-stubs.py
      - tests/**
      - .github/workflows/**
  pull_request:
    paths:
      - config/gitlab-subgroups.yml
      - config/workflow-sync.yml
      - config/workflow-cost-profiles.yml
      - config/template-manifest.yml
      - config/template-consumers.yml
      - registered-imports.json
      - scripts/validate-gitlab-subgroups.py
      - scripts/validate-workflow-guards.py
      - scripts/validate-registered-imports.py
      - scripts/validate-cost-profiles.py
      - scripts/validate-template-config.py
      - scripts/generate-gitlab-stubs.py
      - tests/**
      - .github/workflows/**
  workflow_dispatch:
    inputs:
      config_file:
        description: "Config file to validate (relative to repo root)"
        required: false
        default: "config/gitlab-subgroups.yml"

permissions:
  contents: read

jobs:
  validate-gitlab-subgroups:
    name: Validate gitlab-subgroups.yml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/gitlab-subgroups.yml
        env:
          CONFIG_FILE: ${{ inputs.config_file || 'config/gitlab-subgroups.yml' }}
        run: python3 scripts/validate-gitlab-subgroups.py "$CONFIG_FILE"

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-workflow-guards:
    name: Validate workflow guards and GitLab CI refs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Check rate_limit_rerun guards and .gitlab-ci.yml script refs
        run: python3 scripts/validate-workflow-guards.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-registered-imports:
    name: Validate registered-imports.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate registered-imports.json schema
        run: python3 scripts/validate-registered-imports.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-cost-profiles:
    name: Validate workflow-cost-profiles.yml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate config/workflow-cost-profiles.yml schema
        run: python3 scripts/validate-cost-profiles.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  validate-template-config:
    name: Validate template-manifest.yml and template-consumers.yml
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Validate template manifest and consumers
        run: python3 scripts/validate-template-config.py

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh

  pytest:
    name: Validator unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install pytest
        run: pip install pytest --quiet

      - name: Run tests
        run: python3 -m pytest tests/ -v --tb=short

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
