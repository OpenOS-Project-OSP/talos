name: Resolve CI Failures

on:
  schedule:
    - cron: "30 7 * * *" # Daily at 07:30 UTC — full sweep regardless of notifications
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — detect failures without applying fixes"
        type: boolean
        required: false
        default: false
      scan_owners:
        description: "Space-separated orgs to scan (blank = all three)"
        required: false
        default: ""
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string
  # Note: notify-poller.yml triggers this via REST workflow_dispatch, not workflow_call.

permissions:
  contents: write

concurrency:
  group: resolve-failures
  cancel-in-progress: true   # Newer run supersedes — fix logic is idempotent

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr primary; secondary burst limit
#   returns HTTP 403/429 with X-RateLimit-Reset. resolve-failures.sh retries
#   up to 3 times, sleeping until the reset epoch before each retry.
# GitHub Models API (SYNC_TOKEN): quota varies by model; gpt-4o-mini is used.
#   HTTP 429 includes Retry-After (seconds). llm_ask() retries up to 3 times.
#   On full quota exhaustion the script skips AI analysis and exits 0 so no
#   false failure notification is generated.
# Concurrency group (cancel-in-progress: true) — fix logic is idempotent so
#   a newer run superseding an older one is safe and prevents orphaned runs.

jobs:
  resolve:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Derive OSP-bound repo list from config
        run: |
          repos=$(python3 -c "
          import yaml
          data = yaml.safe_load(open('config/gitlab-subgroups.yml'))
          repos = []
          for sg in data.get('subgroups', {}).values():
              repos.extend(sg.get('repos', []))
          print(' '.join(sorted(set(repos))))
          " 2>/dev/null || echo "")
          echo "OSP_REPOS_FROM_CONFIG=${repos}" >> "$GITHUB_ENV"

      - name: Scan and resolve failures
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          BUDGET_MINUTES: "115"
          WATCHDOG_REPO: ${{ github.repository }}
          SCAN_OWNERS: >-
            ${{
              inputs.scan_owners != '' && inputs.scan_owners ||
              'Interested-Deving-1896 OpenOS-Project-OSP OpenOS-Project-Ecosystem-OOC'
            }}
          REPO_FILTER: ${{ inputs.repo_filter || '' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          # Scopes the I-D-1896 scan to OSP-bound repos only.
          # Scanning all 4000+ I-D-1896 repos exhausts the rate limit and
          # times out. OSP/OOC orgs (33 repos each) are scanned in full.
          # Derived from config/gitlab-subgroups.yml via the prior step.
          OSP_REPOS_OVERRIDE: ${{ env.OSP_REPOS_FROM_CONFIG }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "SYNC_TOKEN not configured — skipping CI failure scan."
            exit 0
          fi
          bash scripts/resolve-failures.sh