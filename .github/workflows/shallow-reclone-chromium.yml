name: Shallow Reclone Large GitLab Mirrors

# Reduces storage usage on large GitLab mirror projects by replacing their
# full git history with a shallow clone at the specified depth.
#
# Run this when the openos-project namespace approaches its 10 GiB storage
# limit. The target list in scripts/shallow-reclone-gl.sh covers all known
# large repos (kernel trees, ChromiumOS overlays, Brave iOS, etc.).
#
# Safe to re-run — idempotent. Only affects mirror repos where GitLab is
# not the source of truth.
#
# Requires:
#   GITLAB_TOKEN  — PAT with api + write_repository on openos-project

on:
  workflow_dispatch:
    inputs:
      depth:
        description: "Shallow clone depth (1 = tip only)"
        required: false
        default: "1"
        type: string
      dry_run:
        description: "Report what would be recloned without pushing"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  reclone:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Shallow-reclone large GitLab mirrors
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          DEPTH: ${{ inputs.depth || '1' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: bash scripts/shallow-reclone-gl.sh

      - name: Write summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          INPUTS_JSON: ${{ toJSON(inputs) }}
        run: bash scripts/write-summary.sh
