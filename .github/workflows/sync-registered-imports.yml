name: Sync Registered Imports

# Re-syncs all repos registered in registered-imports.json.
# For each entry, bare-clones the source URL and pushes all branches + tags
# to the Interested-Deving-1896 counterpart.

on:
  schedule:
    - cron: '55 */6 * * *'  # Every 6h at :55 — import registry changes slowly
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
        type: string
      dry_run:
        description: "Report without pushing"
        required: false
        default: false
        type: boolean
      source_filter:
        description: "Only sync entries from this source host (github/gitlab/gitea/bitbucket)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - github
          - gitlab
          - gitea
          - bitbucket
      force_sync:
        description: "Bypass the pushed_at gate and sync all entries regardless of last push time"
        required: false
        default: false
        type: boolean
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

permissions:
  contents: write

# ── Rate limits ──────────────────────────────────────────────────────────────
# No REST API polling — only git clone from source + git push to GitHub.
# git_push_retry() retries up to 3 times with linear backoff (15 s, 30 s,
#   45 s) on any push failure. Clone failures are logged and skipped; the
#   entry will be retried on the next hourly run.

concurrency:
  group: sync-registered-imports-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "1000"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping. quota-monitor will retry."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Sync registered imports
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          GITLAB_TOKEN: ${{ secrets.GITLAB_SYNC_TOKEN }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          BUDGET_MINUTES: "55"
        run: bash scripts/sync-registered-imports.sh