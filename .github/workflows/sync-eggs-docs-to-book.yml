name: Sync penguins-eggs docs to penguins-eggs-book

# Triggered by a repository_dispatch event from penguins-eggs when
# docs/chromiumos/ changes on the all-features branch.
# Can also be run manually.

on:
  repository_dispatch:
    types: [eggs-docs-updated]
  workflow_dispatch:
    inputs:
      ref:
        description: 'penguins-eggs ref to sync from (default: all-features)'
        required: false
        default: 'all-features'

permissions:
  contents: read

# ── Rate limits ──────────────────────────────────────────────────────────────
# GitHub REST API (SYNC_TOKEN): 5 000 req/hr primary limit.
#   Makes a small number of API calls; unlikely to hit limits in normal use.
#   HTTP 403/429 responses are retried up to 3 times with X-RateLimit-Reset
#   sleep by the underlying script helpers.

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout fork-sync-all (for scripts/)
        uses: actions/checkout@v6

      - name: Checkout penguins-eggs-book
        uses: actions/checkout@v6
        with:
          repository: Interested-Deving-1896/penguins-eggs-book
          token: ${{ secrets.SYNC_TOKEN }}
          path: book

      - name: Checkout penguins-eggs
        uses: actions/checkout@v6
        with:
          repository: Interested-Deving-1896/penguins-eggs
          ref: ${{ github.event.client_payload.ref || inputs.ref || 'all-features' }}
          token: ${{ secrets.SYNC_TOKEN }}
          path: eggs
          sparse-checkout: docs

      - name: Copy docs/ into book
        run: |
          # Mirror each subdirectory of docs/ into the book root.
          # e.g. docs/chromiumos/ → book/chromiumos/
          #      docs/krill/      → book/krill/
          for dir in eggs/docs/*/; do
            topic=$(basename "$dir")
            mkdir -p "book/${topic}"
            cp -r "${dir}." "book/${topic}/"
          done
          echo "Synced docs/ from penguins-eggs @ $(git -C eggs rev-parse --short HEAD)"

      - name: Commit and push if changed
        run: |
          cd book
          git config user.email "sync-bot@github.com"
          git config user.name "Sync Bot"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit — docs are already up to date."
          else
            EGGS_SHA="${{ github.event.client_payload.sha }}"
            MSG="sync: update docs from penguins-eggs"
            if [ -n "${EGGS_SHA}" ]; then
              MSG="${MSG} (${EGGS_SHA:0:7})"
            fi
            git commit -m "${MSG}"
            git push
            echo "Pushed updated chromiumos docs to penguins-eggs-book."
          fi