name: Notification Poller

# Polls the GitHub notifications API every 15 minutes for unread CI failure
# notifications. When any are found, triggers resolve-failures.yml immediately
# rather than waiting for its daily 07:30 UTC schedule.
#
# This workflow itself is intentionally minimal — no checkout, no scripts,
# just a single API call. All the actual fix logic lives in resolve-failures.
#
# Concurrency: if a resolve-failures run is already in progress (cancel-in-
# progress: false), the triggered run will queue behind it automatically.

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes — halved to reduce quota pressure
  workflow_dispatch: {}

permissions:
  actions: write   # Needed to trigger workflow_dispatch on resolve-failures.yml

# ── Rate limits ──────────────────────────────────────────────────────────────
# One GitHub notifications API call every 15 minutes = 4 req/hr, well within
#   the 5 000 req/hr primary limit.
# If SYNC_TOKEN is temporarily rate-limited, curl -sf exits non-zero, count
#   defaults to 0, and no resolver trigger is sent. The next poll retries
#   automatically 15 minutes later.

concurrency:
  group: notify-poller-${{ github.ref }}
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "500"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore ETag cache
        if: steps.quota.outputs.skip == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/notify-poller
          key: notify-poller-etag-v1
          restore-keys: notify-poller-etag-v1

      - name: Check for unread CI failure notifications
        if: steps.quota.outputs.skip == 'false'
        id: check
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # ETag caching: a 304 Not Modified response costs 0 against the
          # rate limit. We persist the ETag from the previous poll in the
          # Actions cache and send If-None-Match on subsequent requests.
          # On 304, notifications haven't changed — skip the resolver trigger.
          CACHE_DIR="${HOME}/.cache/notify-poller"
          ETAG_FILE="${CACHE_DIR}/notifications.etag"
          mkdir -p "$CACHE_DIR"

          ETAG_HEADER=""
          if [[ -f "$ETAG_FILE" ]]; then
            stored_etag=$(cat "$ETAG_FILE")
            [[ -n "$stored_etag" ]] && ETAG_HEADER="-H \"If-None-Match: ${stored_etag}\""
          fi

          # Capture both headers and body; -D - writes headers to stdout
          response=$(eval curl -s -w "\n%{http_code}" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -D "${CACHE_DIR}/response-headers.txt" \
            ${ETAG_HEADER} \
            "https://api.github.com/notifications?all=false&per_page=50") || response=""

          http_code=$(printf '%s' "$response" | tail -1)
          body=$(printf '%s' "$response" | sed '$d')

          # 304 Not Modified — no new notifications since last poll, 0 rate cost
          if [[ "$http_code" == "304" ]]; then
            echo "304 Not Modified — notifications unchanged since last poll (0 rate cost)"
            printf 'ci_failure_count=0\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Persist the new ETag for the next poll
          new_etag=$(grep -i '^etag:' "${CACHE_DIR}/response-headers.txt" 2>/dev/null \
            | tr -d '\r' | awk '{print $2}')
          [[ -n "$new_etag" ]] && printf '%s' "$new_etag" > "$ETAG_FILE"

          # grep -c outputs a bare integer with a trailing newline.
          # Trim it before writing to GITHUB_OUTPUT — a trailing newline
          # causes "Invalid format" and fails the step.
          raw=$(printf '%s' "$body" | grep -c '"ci_activity"') || raw=0
          count=$(printf '%s' "$raw" | tr -d '[:space:]')

          printf 'ci_failure_count=%s\n' "${count}" >> "$GITHUB_OUTPUT"
          echo "Unread CI activity notifications: ${count}"

      - name: Save ETag cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/notify-poller
          key: notify-poller-etag-v1

      - name: Trigger resolver if failures found
        if: steps.quota.outputs.skip == 'false' && steps.check.outputs.ci_failure_count != '0'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          echo "Found ${{ steps.check.outputs.ci_failure_count }} CI notification(s) — triggering resolver..."
          curl -sf \
            -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/resolve-failures.yml/dispatches" \
            -d '{"ref":"main"}' \
            && echo "Resolver triggered." \
            || echo "Failed to trigger resolver — will retry on next poll."

      - name: Check SYNC_TOKEN expiry
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          # GitHub PAT expiry is in the github-authentication-token-expiration
          # response header. A missing header means the token has no expiry set
          # (fine-grained PATs always have one; classic PATs may not).
          expiry=$(curl -sI \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/rate_limit" \
            | grep -i "github-authentication-token-expiration:" \
            | sed 's/.*: //' | tr -d '\r')

          if [[ -z "$expiry" ]]; then
            echo "SYNC_TOKEN: no expiry header (classic PAT with no expiry, or token type does not expose expiry)"
            exit 0
          fi

          expiry_epoch=$(date -d "$expiry" +%s 2>/dev/null || echo 0)
          now_epoch=$(date +%s)
          days_left=$(( (expiry_epoch - now_epoch) / 86400 ))

          echo "SYNC_TOKEN expires: ${expiry} (${days_left} day(s) remaining)"

          if [[ "$days_left" -lt 0 ]]; then
            echo "::error::SYNC_TOKEN has expired — workflows will fail immediately. Rotate it now."
            exit 1
          elif [[ "$days_left" -le 2 ]]; then
            echo "::warning::SYNC_TOKEN expires in ${days_left} day(s). Rotate before it expires."
            # Trigger token-health workflow for a full report
            curl -sf \
              -X POST \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/token-health.yml/dispatches" \
              -d '{"ref":"main"}' \
              && echo "Token health workflow triggered for full report." \
              || echo "Could not trigger token-health workflow."
          fi
