name: Create Missing READMEs

on:
  schedule:
    - cron: '8 7 * * *'    # Daily at 07:08 UTC — moved out of 03:xx cluster
  # Run OSP-priority pass after any workflow that creates new repos
  # so freshly imported repos get a README immediately.
  workflow_run:
    workflows:
      - "Add Mirror Repo"
      - "Import Repository"
      - "Clone Org"
      - "Merge Repos into Monorepo"
    types: [completed]
  workflow_dispatch:
    inputs:
      repo_filter:
        description: "Repo name substring filter (blank = all)"
        required: false
        default: ""
      dry_run:
        description: "Dry run — detect missing READMEs without creating them"
        type: boolean
        required: false
        default: false
      rate_limit_rerun:
        description: "Set by rate-limit-rerun workflow — prevents re-trigger loops"
        required: false
        default: "false"
        type: string

concurrency:
  group: create-readmes
  cancel-in-progress: false  # Never cancel mid-creation

permissions:
  contents: write

jobs:
  create:
    if: inputs.rate_limit_rerun != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6


      - name: Quota pre-flight
        id: quota
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          MIN_QUOTA: "1500"
        run: |
          remaining=$(curl -sf \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/rate_limit \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['resources']['core']['remaining'])")
          echo "remaining=${remaining}" >> "$GITHUB_OUTPUT"
          if [[ "${remaining}" -lt "${MIN_QUOTA}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Quota too low (${remaining} < ${MIN_QUOTA}) — skipping. quota-monitor will retry."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create missing READMEs
        if: steps.quota.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
          GITHUB_OWNER: Interested-Deving-1896
          BUDGET_MINUTES: "55"
        run: bash scripts/create-readmes.sh