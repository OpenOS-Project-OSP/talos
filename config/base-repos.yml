# base-repos.yml — maps arch to the authoritative debian-{arch}-kernel-base repo
#
# Model: one repo per arch, Debian as authoritative base.
# Devuan and Ubuntu patches are branches within the Debian base repo.
# Consumers select the appropriate patchset branch for their target distro/release.
#
# Patchset branch naming: patchset/{distro}/{release}
#
# Consumer support matrix:
#   xanmod:    amd64 arm64 armhf riscv64 s390x ppc64el loong64 i386
#   liquorix:  amd64 arm64 armhf
#   liqxanmod: amd64 arm64

github_org: Interested-Deving-1896

distro_releases:
  debian:  [trixie, forky, sid]
  devuan:  [excalibur, forky, ceres]
  ubuntu:  [resolute, stonking, devel]

# Authoritative base: Debian is upstream for Devuan and Ubuntu
authoritative_base: debian

base_repos:
  - arch: amd64
    repo: debian-amd64-kernel-base
    tier: 1
    consumers: [xanmod, liquorix, liqxanmod]

  - arch: arm64
    repo: debian-arm64-kernel-base
    tier: 1
    consumers: [xanmod, liquorix, liqxanmod]

  - arch: armhf
    repo: debian-armhf-kernel-base
    tier: 2
    consumers: [xanmod, liquorix]

  - arch: riscv64
    repo: debian-riscv64-kernel-base
    tier: 2
    consumers: [xanmod]

  - arch: s390x
    repo: debian-s390x-kernel-base
    tier: 2
    consumers: [xanmod]

  - arch: armel
    repo: debian-armel-kernel-base
    tier: 3
    consumers: []

  - arch: ppc64el
    repo: debian-ppc64el-kernel-base
    tier: 3
    consumers: [xanmod]

  - arch: mips64el
    repo: debian-mips64el-kernel-base
    tier: 3
    consumers: []

  - arch: loong64
    repo: debian-loong64-kernel-base
    tier: 3
    consumers: [xanmod]

  - arch: i386
    repo: debian-i386-kernel-base
    tier: 3
    consumers: [xanmod]
    notes: "32-bit x86. Debian arch name is i386 (not i686). Liquorix dropped 32-bit support."
